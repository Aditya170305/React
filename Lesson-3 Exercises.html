<!DOCTYPE html>
<html>
<head>
    <title>React Basics</title>
</head>

<body>

    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ClickedButton({count , setCount}){

            function update(){
                console.log("Clicked");
                setCount(count + 1);
            }

            return (

                <button onClick={update}>
                Clicked {count} times
                </button>

            );
        }

        function ClickedButtonAnother({count , setCount}){

            function update(){
                console.log("Clicked");
                setCount(count + 1);
            }

            return(

                <button onClick = {update}>
                    Clicked {count} times
                </button>

            );
        }

        function ResetButton({count , setCount}){
            
            function reset(){
                setCount(0);
            }

            return(
                <button onClick = {reset}>
                    Reset
                </button>
            )
        }


        function App(){

            const [count , setCount] = React.useState(0);


            return(
                <>
                    <ClickedButton 
                        count = {count}
                        setCount = {setCount}
                    />

                    <ClickedButtonAnother
                        count = {count}
                        setCount = {setCount} 
                    />

                    <ResetButton 
                        count = {count}
                        setCount = {setCount}
                    />
                </>
            )

        }
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />); 
    </script>
</body>
</html>
